version: '3.8'

services:
  
  db_mysql:
    image: mysql:8.0
    container_name: mysql_container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: minha_app_relacional
    ports:
      - "3310:3306"
    networks:
      - rede_bancos
    volumes:
      - ./data/mysql:/var/lib/mysql

  
  db_mongo:
    image: mongo:latest
    container_name: mongo_container
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: mongo_password
    ports:
      - "2717:27017" 
    networks:
      - rede_bancos
    volumes:
      - ./data/mongo:/data/db

networks:
  rede_bancos:
    driver: bridge